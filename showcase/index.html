<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RhetBench — Replay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap" rel="stylesheet">
<style>
  :root {
    /* Warm Observatory palette */
    --bg:        #14100e;
    --bg2:       #1c1714;
    --surface:   #231e1a;
    --surface2:  #2e2822;
    --surface3:  #3a332c;
    --border:    #3d3530;
    --border2:   #52453d;

    /* Amber-warm accents */
    --amber:     #d4a853;
    --amber-dim: #a07b38;
    --cream:     #e8dcc8;
    --cream-dim: #b09f86;
    --ivory:     #f2ead8;

    /* Functional colors — warmed */
    --green:     #7dbe8c;
    --red:       #c96b5a;
    --blue:      #7ba8c4;
    --purple:    #9b84c4;
    --orange:    #c48a4f;
    --teal:      #5ea89c;

    --text:      #e2d5be;
    --muted:     #7d6e5a;
    --faint:     #4a3f34;

    /* Argument type colors */
    --at-logical:      #7ba8c4;
    --at-emotional:    #c46b7a;
    --at-authority:    #7dbe8c;
    --at-social:       #d4a853;
    --at-anecdote:     #c48a4f;
    --at-concession:   #9b84c4;
    --at-generic:      #5a5048;

    /* Chat bubble backgrounds */
    --agent-bg:  #1e1a16;
    --npc-bg:    #1a1c20;

    /* Typography */
    --serif:     'Fraunces', 'Libre Baskerville', Georgia, serif;
    --mono:      'DM Mono', 'Fira Code', monospace;
    --body:      'DM Mono', system-ui, sans-serif;

    /* Grain texture via SVG */
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: var(--grain);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 296px 1fr 268px;
    grid-template-rows: 58px 1fr 118px;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    grid-column: 1/-1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber-dim), transparent);
    opacity: 0.4;
  }

  .logo {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    font-style: italic;
    color: var(--amber);
    letter-spacing: -0.3px;
    line-height: 1;
  }

  .badge {
    padding: 3px 10px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
  }

  .scenario-title {
    font-size: 12px;
    color: var(--cream-dim);
    font-family: var(--mono);
    font-style: italic;
  }

  /* ── Sidebars ── */
  .sidebar-left, .sidebar-right {
    grid-row: 2/3;
    overflow-y: auto;
    background: var(--surface);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar-left { border-right: 1px solid var(--border); }
  .sidebar-right { border-left: 1px solid var(--border); }

  .main {
    grid-row: 2/3;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    background-image: var(--grain);
  }

  /* ── Controls footer ── */
  .controls {
    grid-column: 1/-1;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 24px;
  }

  /* ── Section labels ── */
  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* ── Episode rail ── */
  .ep-rail { padding: 14px 14px 10px; }
  .ep-grid { display: flex; flex-wrap: wrap; gap: 5px; }

  .ep-btn {
    width: 34px; height: 34px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 10px;
    font-weight: 500;
    font-family: var(--mono);
    color: var(--muted);
    transition: border-color 0.12s, color 0.12s, background 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .ep-btn:hover { border-color: var(--amber-dim); color: var(--cream); }
  .ep-btn.active { border-color: var(--amber); color: var(--amber); background: color-mix(in srgb, var(--amber) 10%, var(--surface2)); }
  .ep-btn.won { border-color: var(--green); color: var(--green); }
  .ep-btn.lost { border-color: var(--red); color: var(--red); }
  .ep-btn.won.active { background: color-mix(in srgb, var(--green) 12%, var(--surface2)); }
  .ep-btn.lost.active { background: color-mix(in srgb, var(--red) 12%, var(--surface2)); }

  /* ── Scenario info ── */
  .scenario-info { padding: 10px 14px; border-top: 1px solid var(--border); }

  .info-block { margin-bottom: 10px; }
  .info-block .section-label { margin-bottom: 3px; }
  .info-block .info-text {
    font-size: 12px;
    color: var(--cream-dim);
    line-height: 1.5;
    font-family: var(--mono);
  }

  .info-params { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 8px; }
  .info-row { display: flex; justify-content: space-between; font-size: 10.5px; }
  .info-label { color: var(--muted); flex-shrink: 0; font-family: var(--mono); }
  .info-value { color: var(--cream-dim); font-weight: 500; text-align: right; font-family: var(--mono); }

  .info-detail { cursor: pointer; user-select: none; margin-top: 6px; }
  .info-detail summary {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-family: var(--mono);
    margin-bottom: 6px;
    list-style: none;
  }
  .info-detail summary::before { content: '+ '; }
  .info-detail[open] summary::before { content: '− '; }
  .info-detail summary:hover { color: var(--cream-dim); }
  .info-detail p {
    font-size: 10.5px;
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 5px 0;
    font-family: var(--mono);
  }

  /* ── Bars ── */
  .agree-section { padding: 10px 14px; border-top: 1px solid var(--border); }

  .bar-wrap {
    position: relative;
    height: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-wrap.small { height: 12px; }

  .bar-fill {
    position: absolute; top: 0; height: 100%;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1),
                left 0.35s cubic-bezier(0.4,0,0.2,1),
                background 0.35s;
  }

  .bar-center {
    position: absolute; top: 0; left: 50%;
    width: 1px; height: 100%;
    background: var(--border2);
    transform: translateX(-50%);
    z-index: 1;
  }

  .bar-threshold {
    position: absolute; top: 0; height: 100%;
    width: 1px;
    background: var(--green);
    opacity: 0.6;
    z-index: 2;
  }

  .bar-value {
    font-size: 16px;
    font-weight: 400;
    text-align: center;
    margin-top: 5px;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }
  .bar-value.small { font-size: 12px; margin-top: 3px; }
  .bar-hint { font-size: 9px; color: var(--faint); text-align: center; margin-top: 3px; font-family: var(--mono); letter-spacing: 0.04em; }

  /* ── Dev section ── */
  .dev-section { padding: 10px 14px; border-top: 1px solid var(--border); }
  .dev-row { font-size: 9.5px; color: var(--faint); font-family: var(--mono); margin-bottom: 3px; word-break: break-all; }

  /* ── Chat ── */
  .chat {
    flex: 1;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .msg { display: flex; gap: 10px; max-width: 82%; }
  .msg.agent { align-self: flex-start; }
  .msg.npc { align-self: flex-end; flex-direction: row-reverse; }
  .msg.system { align-self: center; max-width: 96%; width: 100%; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-weight: 500;
    font-family: var(--mono);
    letter-spacing: 0.04em;
    border: 1px solid var(--border2);
  }
  .agent .avatar { background: color-mix(in srgb, var(--amber) 12%, var(--surface2)); color: var(--amber-dim); }
  .npc .avatar { background: color-mix(in srgb, var(--blue) 12%, var(--surface2)); color: var(--blue); }

  .bubble {
    padding: 11px 14px;
    font-size: 13px;
    line-height: 1.65;
    position: relative;
    font-family: var(--mono);
  }

  .agent .bubble {
    background: var(--agent-bg);
    border: 1px solid color-mix(in srgb, var(--amber) 18%, var(--border));
    border-radius: 0 10px 10px 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.3), inset 0 0 0 0.5px rgba(212,168,83,0.06);
  }

  .npc .bubble {
    background: var(--npc-bg);
    border: 1px solid color-mix(in srgb, var(--blue) 18%, var(--border));
    border-radius: 10px 0 10px 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.3), inset 0 0 0 0.5px rgba(123,168,196,0.06);
    color: var(--cream-dim);
  }

  .system .bubble {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--faint);
    text-align: center;
    width: 100%;
    padding: 8px 14px;
    font-style: italic;
  }

  .arg-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-top: 7px;
    font-family: var(--mono);
    border: 1px solid currentColor;
    opacity: 0.85;
  }

  .reward-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    font-family: var(--mono);
    margin-left: 4px;
  }

  .current-indicator {
    position: absolute; top: -3px; right: -3px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
    animation: glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px var(--amber); }
    50% { opacity: 0.6; transform: scale(1.2); box-shadow: 0 0 12px var(--amber); }
  }

  /* Argument type colors — warm, distinct */
  .at-EMOTIONAL    { color: var(--at-emotional);   border-color: var(--at-emotional); }
  .at-LOGICAL      { color: var(--at-logical);     border-color: var(--at-logical); }
  .at-SOCIAL_PROOF { color: var(--at-social);      border-color: var(--at-social); }
  .at-AUTHORITY    { color: var(--at-authority);   border-color: var(--at-authority); }
  .at-ANECDOTE     { color: var(--at-anecdote);    border-color: var(--at-anecdote); }
  .at-CONCESSION   { color: var(--at-concession);  border-color: var(--at-concession); }
  .at-GENERIC      { color: var(--at-generic);     border-color: var(--at-generic); }

  /* ── HUD (right sidebar) ── */
  .hud { padding: 14px; }

  .hud-title {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .metric {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 9px;
    gap: 8px;
  }
  .metric-label {
    font-size: 10.5px;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .metric-value {
    font-size: 13px;
    font-weight: 400;
    font-family: var(--mono);
    text-align: right;
  }
  .metric-value.good   { color: var(--green); }
  .metric-value.bad    { color: var(--red); }
  .metric-value.neutral { color: var(--cream-dim); }

  .strategy-bar { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }

  .reasoning-box { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .reasoning-text {
    font-size: 11px;
    color: var(--faint);
    line-height: 1.55;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-style: italic;
    font-family: var(--mono);
  }

  /* ── Controls ── */
  .scrubber-row { display: flex; align-items: center; gap: 14px; }

  .scrubber {
    flex: 1;
    appearance: none;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    cursor: pointer;
    outline: none;
  }
  .scrubber::-webkit-slider-thumb {
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--amber-dim);
    transition: box-shadow 0.15s;
  }
  .scrubber::-webkit-slider-thumb:hover { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--amber); }

  .turn-display {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    min-width: 70px;
    white-space: nowrap;
  }

  .btn-row { display: flex; align-items: center; gap: 8px; }

  .ctrl-btn {
    padding: 6px 16px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--cream-dim);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .ctrl-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
  .ctrl-btn.play {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    font-weight: 500;
  }
  .ctrl-btn.play:hover { background: var(--cream); border-color: var(--cream); }

  .speed-select {
    padding: 5px 9px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    outline: none;
  }
  .speed-select:focus { border-color: var(--amber-dim); }

  .status-pill {
    padding: 3px 11px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 500;
    font-family: var(--mono);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    border: 1px solid currentColor;
  }
  .status-pill.won { color: var(--green); }
  .status-pill.lost { color: var(--red); }

  .no-data {
    display: flex; align-items: center; justify-content: center;
    height: 100%;
    color: var(--faint);
    font-size: 13px;
    font-family: var(--mono);
    font-style: italic;
    flex-direction: column;
    gap: 8px;
  }

  /* Run selector */
  #run-selector {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--cream-dim);
    font-size: 11px;
    font-family: var(--mono);
    padding: 6px 8px;
    margin-bottom: 10px;
    cursor: pointer;
    outline: none;
  }
  #run-selector:focus { border-color: var(--amber-dim); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

  /* Header KBD shortcut hint */
  .kbd-hint { font-size: 11px; color: var(--faint); font-family: var(--mono); }
  kbd {
    background: var(--surface3);
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <span class="logo">RhetBench</span>
    <span class="badge">SWECCATHON 2026</span>
    <span class="scenario-title" id="hdr-scenario">Loading...</span>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <span class="status-pill" id="hdr-status"></span>
      <span class="kbd-hint">Press <kbd>Space</kbd> to play</span>
    </div>
  </header>

  <aside class="sidebar-left">
    <div id="run-selector-wrap" class="ep-rail" style="display:none">
      <div class="section-label">Select Run</div>
      <select id="run-selector"></select>
    </div>
    <div class="ep-rail">
      <div class="section-label">Episodes</div>
      <div class="ep-grid" id="ep-grid"></div>
    </div>
    <div class="scenario-info" id="scenario-info"></div>
    <div class="agree-section">
      <div class="section-label">Agreement</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="agree-fill"></div>
        <div class="bar-center"></div>
        <div class="bar-threshold" id="agree-threshold"></div>
      </div>
      <div class="bar-value" id="agree-value">—</div>
    </div>
    <div class="agree-section">
      <div class="section-label">Rapport</div>
      <div class="bar-wrap small">
        <div class="bar-fill" id="rapport-fill"></div>
        <div class="bar-center"></div>
      </div>
      <div class="bar-value small" id="rapport-value">—</div>
      <div class="bar-hint">trust amplifies every argument ±24%</div>
    </div>
    <div class="dev-section" id="dev-section"></div>
  </aside>

  <main class="main" id="chat-main">
    <div class="chat" id="chat"></div>
  </main>

  <aside class="sidebar-right">
    <div class="hud">
      <div class="hud-title">Live Telemetry</div>
      <div class="metric"><span class="metric-label">Turn</span><span class="metric-value neutral" id="hud-turn">—</span></div>
      <div class="metric"><span class="metric-label">Reward</span><span class="metric-value neutral" id="hud-reward">—</span></div>
      <div class="metric"><span class="metric-label">Cumulative</span><span class="metric-value neutral" id="hud-cumulative">—</span></div>
      <div class="metric"><span class="metric-label">Diversity</span><span class="metric-value neutral" id="hud-diversity">—</span></div>
      <div class="metric"><span class="metric-label">Rep penalty</span><span class="metric-value neutral" id="hud-penalty">—</span></div>
      <div class="metric"><span class="metric-label">Rapport</span><span class="metric-value neutral" id="hud-rapport">—</span></div>
      <div class="metric"><span class="metric-label">Rapport effect</span><span class="metric-value neutral" id="hud-rapport-effect">—</span></div>
      <div class="metric"><span class="metric-label">Norm score</span><span class="metric-value neutral" id="hud-norm">—</span></div>
      <div class="strategy-bar" id="strategy-bar"></div>
      <div class="reasoning-box">
        <div class="hud-title">Model Reasoning</div>
        <div class="reasoning-text" id="hud-reasoning">(not available in export)</div>
      </div>
    </div>
  </aside>

  <footer class="controls">
    <div class="scrubber-row">
      <span class="turn-display" id="turn-display">Turn 0 / 0</span>
      <input type="range" class="scrubber" id="scrubber" min="0" value="0" step="1">
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" id="btn-prev" title="Step back (←)">&#9664;&#9664;</button>
      <button class="ctrl-btn play" id="btn-play" title="Play/Pause (Space)">&#9654; Play</button>
      <button class="ctrl-btn" id="btn-next" title="Step forward (→)">&#9654;&#9654;</button>
      <select class="speed-select" id="speed-select">
        <option value="2000">0.5x</option>
        <option value="1000" selected>1x</option>
        <option value="500">2x</option>
        <option value="250">4x</option>
      </select>
    </div>
  </footer>
</div>

<script>
let REPLAY = null;
let runMeta = {};
let manifest = [];

function loadManifest() {
  return fetch('data/manifest.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('no manifest'); return r.json(); })
    .catch(() => []);
}

function loadReplayFile(filename) {
  return fetch('data/' + filename + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); });
}

function loadReplay() {
  if (window.REPLAY) return Promise.resolve(window.REPLAY);
  return fetch('data/replay.json')
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .catch(() => makeDemoReplay());
}

function makeDemoReplay() {
  return {
    run: { id: 'demo', config: { agent_config: { model: 'demo/local' } }, scores: { persuasion_score: 0.88, win_rate: 1.0 } },
    episodes: [{ id: 'demo-1', seed: 42, terminal_info: { won: '1' } }],
    traces: {},
    replay: { 'demo-1': [
      { step: 1, board_before: { turn: 0, max_turns: 25, topic: 'adopting renewable energy', your_position: 'Transition to renewables.', scenario_context: 'Demo mode — export a real run with: python save_run.py RUN_ID', npc_opening_statement: 'I need hard numbers. What is the actual payback period?', npc_response: 'I need hard numbers. What is the actual payback period?', turns_remaining: '25' },
        observation: { turn: 1, npc_response: 'ROI data is better than expected.', turns_remaining: '24' },
        action: { message: 'Studies show 5-year payback with 20% cost reduction.' }, reward: 0.22, info: { argument_type: 'LOGICAL', agreement: '-0.28', rapport: '0.055', threshold: '0.25', norm_score: '0.0', won: '0', diversity: '1', rep_penalty_total: '0.0', scenario_display_name: 'The Data Skeptic', npc_response: 'ROI data is better than expected.' } },
    ] }
  };
}

let episodes = [];
let currentEpIdx = 0;
let currentTurnIdx = 0;
let playing = false;
let playTimer = null;

loadManifest().then(m => {
  manifest = m;
  if (manifest.length > 0) {
    const wrap = document.getElementById('run-selector-wrap');
    const sel = document.getElementById('run-selector');
    wrap.style.display = '';
    manifest.forEach((entry) => {
      const opt = document.createElement('option');
      opt.value = entry.filename;
      const wr = entry.scores?.win_rate;
      const label = entry.label + (wr !== undefined ? ` — ${(wr*100).toFixed(0)}% win` : '');
      opt.textContent = label;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      loadReplayFile(sel.value).then(data => initFromData(data));
    });
    return loadReplayFile(manifest[0].filename);
  }
  return loadReplay();
}).then(data => initFromData(data));

function initFromData(data) {
  REPLAY = data;

  if (data.run) {
    runMeta = {
      id: data.run.id || '',
      model: data.run.config?.agent_config?.model || 'unknown',
      scores: data.run.scores || {},
    };
  }

  const traceLookup = {};
  if (data.traces) {
    for (const [epId, events] of Object.entries(data.traces)) {
      traceLookup[epId] = {};
      for (const ev of events) {
        if (ev.event_type === 'technique_event') {
          const p = typeof ev.payload === 'string' ? JSON.parse(ev.payload) : ev.payload;
          if (p.kind === 'reasoning' || p.reasoning) {
            traceLookup[epId][ev.step] = p.reasoning || p.content || JSON.stringify(p);
          }
        }
      }
    }
  }

  if (data.episodes && data.replay) {
    episodes = data.episodes.map(ep => {
      const epId = ep.id || ep.episode_id;
      const rawSteps = data.replay[epId] || [];
      const epTraces = traceLookup[epId] || {};
      const steps = [];

      if (rawSteps.length > 0 && rawSteps[0].board_before) {
        const firstInfo = rawSteps[0].info || {};
        const startAgreement = firstInfo.starting_agreement || ep.terminal_info?.starting_agreement;
        const threshold = firstInfo.threshold || ep.terminal_info?.threshold;
        const difficulty = firstInfo.difficulty || ep.terminal_info?.difficulty || '';
        const diffExpl = firstInfo.difficulty_explanation || ep.terminal_info?.difficulty_explanation || '';
        const benchVal = firstInfo.benchmarking_value || ep.terminal_info?.benchmarking_value || '';
        const repPen = firstInfo.repetition_penalty || ep.terminal_info?.repetition_penalty || '';
        steps.push({
          turn: 0, observation: rawSteps[0].board_before,
          action: null, reward: 0, reasoning: '',
          info: {
            agreement: startAgreement || '',
            starting_agreement: startAgreement || '',
            rapport: '0.0',
            threshold: threshold || '',
            difficulty, difficulty_explanation: diffExpl,
            benchmarking_value: benchVal, repetition_penalty: repPen,
            scenario_id: firstInfo.scenario_id || '',
            scenario_display_name: firstInfo.scenario_display_name || '',
          },
        });
      }

      for (const t of rawSteps) {
        let action = t.action;
        if (typeof action === 'string') {
          try { action = JSON.parse(action); } catch(e) { action = { message: action }; }
        }
        const stepNum = t.step !== undefined ? t.step : steps.length;
        steps.push({
          turn: stepNum,
          observation: t.observation || {},
          action,
          reward: t.reward || 0,
          info: t.info || {},
          reasoning: t.reasoning || epTraces[stepNum] || epTraces[String(stepNum)] || '',
        });
      }

      const won = ep.terminal_info?.won === '1' || ep.terminal_info?.won === 1
        || steps.some(s => s.info?.won === '1');
      const error = ep.terminal_info?.error || (ep.status === 'failed' && steps.length <= 1
        ? 'Episode failed — likely token limit or rate limit.' : '');
      return { id: epId, seed: ep.seed, won, steps, error, status: ep.status };
    });
  } else if (data.steps) {
    episodes = [{ id: 'local-0', seed: data.seed,
      won: data.steps.some(s => s.info?.won === '1'), steps: data.steps }];
  }

  if (!episodes.length || episodes.every(ep => !ep.steps.length)) {
    document.getElementById('chat').innerHTML = '<div class="no-data"><div>No replay data found.</div></div>';
    return;
  }

  buildEpRail();
  buildDevSection();
  selectEpisode(0);
}

function buildDevSection() {
  const el = document.getElementById('dev-section');
  const sc = runMeta.scores;
  el.innerHTML = `
    <div class="section-label">Run</div>
    <div class="dev-row">model: ${escHtml(runMeta.model)}</div>
    ${sc?.win_rate !== undefined ? `<div class="dev-row">win_rate: ${(sc.win_rate*100).toFixed(0)}%</div>` : ''}
    ${sc?.strategy_optimality !== undefined ? `<div class="dev-row">optimality: ${sc.strategy_optimality.toFixed(3)}</div>` : ''}
    ${sc?.avg_turns_to_win !== undefined ? `<div class="dev-row">avg_turns_to_win: ${sc.avg_turns_to_win.toFixed(1)}</div>` : ''}
    ${sc?.persuasion_score !== undefined ? `<div class="dev-row">persuasion: ${Math.min(sc.persuasion_score, 3).toFixed(3)}</div>` : ''}
    <div class="dev-row" style="margin-top:4px; word-break:break-all; color: var(--faint)">id: ${escHtml(runMeta.id.slice(0,16))}...</div>
  `;
}

function buildEpRail() {
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '';
  episodes.forEach((ep, i) => {
    const btn = document.createElement('button');
    const cls = ep.error ? ' lost' : (ep.won ? ' won' : ' lost');
    btn.className = 'ep-btn' + cls;
    btn.textContent = ep.error ? '!' : (i + 1);
    btn.title = ep.error
      ? `Episode ${i + 1} — ERROR (seed ${ep.seed})`
      : `Episode ${i + 1} — ${ep.won ? 'WON' : 'LOST'} (seed ${ep.seed})`;
    btn.addEventListener('click', () => selectEpisode(i));
    grid.appendChild(btn);
  });
}

function selectEpisode(idx) {
  stopPlay();
  currentEpIdx = idx;
  currentTurnIdx = 0;
  document.querySelectorAll('.ep-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const ep = episodes[idx];
  document.getElementById('scrubber').max = Math.max(0, ep.steps.length - 1);
  document.getElementById('scrubber').value = 0;
  renderTurn(0);

  let scenarioName = '';
  for (const s of ep.steps) {
    if (s.info?.scenario_display_name) { scenarioName = s.info.scenario_display_name; break; }
  }
  document.getElementById('hdr-scenario').textContent = scenarioName || 'Episode ' + (idx + 1);
  const statusEl = document.getElementById('hdr-status');
  if (ep.error) {
    statusEl.className = 'status-pill lost';
    statusEl.textContent = 'ERROR';
  } else {
    statusEl.className = 'status-pill ' + (ep.won ? 'won' : 'lost');
    statusEl.textContent = ep.won ? 'WON' : 'LOST';
  }
}

function renderTurn(turnIdx) {
  currentTurnIdx = turnIdx;
  const ep = episodes[currentEpIdx];
  const chat = document.getElementById('chat');
  chat.innerHTML = '';

  if (ep.error) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg system';
    errDiv.innerHTML = `<div class="bubble" style="border-color:var(--red); color:var(--red);">
      <strong>Episode failed</strong><br>${escHtml(ep.error.slice(0, 500))}${ep.error.length > 500 ? '...' : ''}
    </div>`;
    chat.appendChild(errDiv);
  }

  for (let i = 0; i <= turnIdx && i < ep.steps.length; i++) {
    const step = ep.steps[i];
    const isCurrent = i === turnIdx;

    if (!step.action) {
      const obs = step.observation || {};
      if (obs.scenario_context) appendSystemMsg(chat, obs.scenario_context);
      const opening = obs.npc_opening_statement || obs.npc_response;
      if (opening) appendNpcMsg(chat, opening, isCurrent && turnIdx === 0);
      continue;
    }

    const msg = extractMessage(step.action);
    if (msg) {
      const argType = step.info?.argument_type || 'GENERIC';
      appendAgentMsg(chat, msg, argType, step.reward, isCurrent);
    }

    const npcResp = step.info?.npc_response || step.observation?.npc_response;
    if (npcResp) appendNpcMsg(chat, npcResp, false);
  }

  document.getElementById('chat-main').scrollTop = document.getElementById('chat-main').scrollHeight;
  updateBars(turnIdx);
  updateHUD(turnIdx);
  document.getElementById('scrubber').value = turnIdx;
  document.getElementById('turn-display').textContent = `turn ${turnIdx} / ${ep.steps.length - 1}`;
  updateScenarioInfo(ep.steps[0]);
}

function extractMessage(action) {
  if (!action) return null;
  if (typeof action === 'string') return action;
  if (action.message) return action.message;
  if (action.action?.message) return action.action.message;
  return null;
}

function appendSystemMsg(container, text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  container.appendChild(div);
}

function appendAgentMsg(container, text, argType, reward, isCurrent) {
  const div = document.createElement('div');
  div.className = 'msg agent';
  const rs = reward >= 0 ? '+' : '';
  const rc = reward > 0 ? 'var(--green)' : reward < 0 ? 'var(--red)' : 'var(--muted)';
  div.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble" style="position:relative">
      ${isCurrent ? '<span class="current-indicator"></span>' : ''}
      ${escHtml(text)}
      <div style="margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <span class="arg-tag at-${argType}">${argType}</span>
        <span class="reward-tag" style="color:${rc}">delta ${rs}${(reward||0).toFixed(3)}</span>
      </div>
    </div>`;
  container.appendChild(div);
}

function appendNpcMsg(container, text, isCurrent) {
  const div = document.createElement('div');
  div.className = 'msg npc';
  div.innerHTML = `
    <div class="avatar">NPC</div>
    <div class="bubble" style="position:relative">
      ${isCurrent ? '<span class="current-indicator" style="background:var(--blue); box-shadow: 0 0 6px var(--blue)"></span>' : ''}
      ${escHtml(text)}
    </div>`;
  container.appendChild(div);
}

function setBarFill(fillEl, value, posColor, negColor) {
  const pct = Math.abs(value) * 50;
  if (value >= 0) {
    fillEl.style.left = '50%';
    fillEl.style.width = pct + '%';
    fillEl.style.background = posColor;
  } else {
    fillEl.style.left = (50 - pct) + '%';
    fillEl.style.width = pct + '%';
    fillEl.style.background = negColor;
  }
}

function getInfoAt(turnIdx) {
  const ep = episodes[currentEpIdx];
  for (let i = turnIdx; i >= 0; i--) {
    const info = ep.steps[i]?.info;
    if (info && info.agreement !== undefined) return info;
  }
  return {};
}

function updateBars(turnIdx) {
  const info = getInfoAt(turnIdx);
  const agreement = parseFloat(info.agreement);
  const threshold = parseFloat(info.threshold);
  const rapport = parseFloat(info.rapport);

  const agreeFill = document.getElementById('agree-fill');
  const agreeVal = document.getElementById('agree-value');
  if (!isNaN(agreement)) {
    const posColor = (!isNaN(threshold) && agreement >= threshold) ? 'var(--green)' : 'var(--amber-dim)';
    setBarFill(agreeFill, agreement, posColor, 'var(--red)');
    agreeVal.textContent = agreement.toFixed(3);
    agreeVal.style.color = (!isNaN(threshold) && agreement >= threshold)
      ? 'var(--green)' : agreement >= 0 ? 'var(--amber)' : 'var(--red)';
  } else {
    agreeFill.style.width = '0%';
    agreeVal.textContent = '—';
    agreeVal.style.color = 'var(--muted)';
  }

  if (!isNaN(threshold)) {
    const threshPct = ((threshold + 1) / 2) * 100;
    document.getElementById('agree-threshold').style.left = threshPct + '%';
    document.getElementById('agree-threshold').style.display = '';
  } else {
    document.getElementById('agree-threshold').style.display = 'none';
  }

  const rapportFill = document.getElementById('rapport-fill');
  const rapportVal = document.getElementById('rapport-value');
  if (!isNaN(rapport)) {
    const posC = rapport > 0.3 ? 'var(--green)' : 'var(--amber-dim)';
    setBarFill(rapportFill, rapport, posC, 'var(--red)');
    rapportVal.textContent = rapport.toFixed(3);
    rapportVal.style.color = rapport > 0.2 ? 'var(--green)' : rapport < -0.1 ? 'var(--red)' : 'var(--muted)';
  } else {
    rapportFill.style.width = '0%';
    rapportVal.textContent = '—';
    rapportVal.style.color = 'var(--muted)';
  }
}

function updateHUD(turnIdx) {
  const ep = episodes[currentEpIdx];
  const step = ep.steps[turnIdx] || {};
  const info = getInfoAt(turnIdx);

  const hset = (id, val, cls) => {
    const el = document.getElementById(id);
    if (el) { el.textContent = val; el.className = 'metric-value ' + (cls || 'neutral'); }
  };

  hset('hud-turn', info.turn || turnIdx, 'neutral');
  const reward = step.reward;
  hset('hud-reward', reward !== undefined && reward !== 0 ? (reward >= 0 ? '+' : '') + reward.toFixed(4) : '—',
    reward > 0 ? 'good' : reward < 0 ? 'bad' : 'neutral');

  let cum = 0;
  for (let i = 0; i <= turnIdx; i++) cum += (ep.steps[i]?.reward || 0);
  hset('hud-cumulative', (cum >= 0 ? '+' : '') + cum.toFixed(4), cum >= 0 ? 'good' : 'bad');
  hset('hud-diversity', info.diversity || '—', 'neutral');
  hset('hud-penalty', info.rep_penalty_total ? '-' + info.rep_penalty_total : '—',
    parseFloat(info.rep_penalty_total) > 0 ? 'bad' : 'neutral');

  const rapport = parseFloat(info.rapport);
  hset('hud-rapport', !isNaN(rapport) ? (rapport >= 0 ? '+' : '') + rapport.toFixed(3) : '—',
    rapport > 0.2 ? 'good' : rapport < -0.1 ? 'bad' : 'neutral');
  if (!isNaN(rapport)) {
    const effect = rapport * 0.30;
    hset('hud-rapport-effect', (effect >= 0 ? '+' : '') + (effect * 100).toFixed(1) + '% to shifts',
      effect > 5 ? 'good' : effect < -3 ? 'bad' : 'neutral');
  } else {
    hset('hud-rapport-effect', '—', 'neutral');
  }
  hset('hud-norm', info.norm_score || '—',
    parseFloat(info.norm_score) > 0.5 ? 'good' : parseFloat(info.norm_score) < 0 ? 'bad' : 'neutral');

  const stratBar = document.getElementById('strategy-bar');
  if (info.arg_types_used) {
    try {
      const types = JSON.parse(info.arg_types_used);
      const counts = {};
      types.forEach(t => counts[t] = (counts[t] || 0) + 1);
      stratBar.innerHTML = Object.entries(counts).map(([t, n]) =>
        `<span class="arg-tag at-${t}" title="${t}: ${n}x">${t.slice(0,3)} ×${n}</span>`).join('');
    } catch(e) { stratBar.innerHTML = ''; }
  } else { stratBar.innerHTML = ''; }

  const reasoning = step.reasoning || '';
  document.getElementById('hud-reasoning').textContent = reasoning || '(not available in export)';
}

function updateScenarioInfo(step0) {
  const obs = step0?.observation || {};
  const info = getInfoAt(0);
  const container = document.getElementById('scenario-info');
  const topic = obs.topic || '';
  const pos = obs.your_position || '';
  const threshold = info.threshold || '';
  const startAgree = info.starting_agreement || info.agreement || '';
  const difficulty = info.difficulty || '';
  const diffExpl = info.difficulty_explanation || '';
  const benchVal = info.benchmarking_value || '';
  const repPen = info.repetition_penalty || '';
  container.innerHTML = `
    <div class="info-block">
      <span class="section-label">Topic</span>
      <div class="info-text">${escHtml(topic)}</div>
    </div>
    <div class="info-block">
      <span class="section-label">Position</span>
      <div class="info-text">${escHtml(pos)}</div>
    </div>
    <div class="info-params">
      ${difficulty ? `<div class="info-row"><span class="info-label">difficulty</span><span class="info-value">${escHtml(difficulty)}</span></div>` : ''}
      ${startAgree ? `<div class="info-row"><span class="info-label">start</span><span class="info-value">${startAgree}</span></div>` : ''}
      ${threshold ? `<div class="info-row"><span class="info-label">threshold</span><span class="info-value">${threshold}</span></div>` : ''}
      ${repPen ? `<div class="info-row"><span class="info-label">rep pen</span><span class="info-value">${repPen}</span></div>` : ''}
    </div>
    ${(diffExpl || benchVal) ? `<details class="info-detail">
      <summary>scenario details</summary>
      ${diffExpl ? `<p><strong>difficulty:</strong> ${escHtml(diffExpl)}</p>` : ''}
      ${benchVal ? `<p><strong>tests:</strong> ${escHtml(benchVal)}</p>` : ''}
    </details>` : ''}
  `;
}

function stopPlay() {
  playing = false; clearTimeout(playTimer);
  document.getElementById('btn-play').innerHTML = '&#9654; Play';
  document.getElementById('btn-play').classList.add('play');
}
function startPlay() {
  playing = true;
  document.getElementById('btn-play').innerHTML = '&#9646;&#9646; Pause';
  document.getElementById('btn-play').classList.add('play');
  tick();
}
function tick() {
  if (!playing) return;
  const ep = episodes[currentEpIdx];
  if (currentTurnIdx >= ep.steps.length - 1) { stopPlay(); return; }
  renderTurn(currentTurnIdx + 1);
  playTimer = setTimeout(tick, parseInt(document.getElementById('speed-select').value));
}

document.getElementById('btn-play').addEventListener('click', () => { if (playing) stopPlay(); else startPlay(); });
document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); if (currentTurnIdx > 0) renderTurn(currentTurnIdx - 1); });
document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); const ep = episodes[currentEpIdx]; if (currentTurnIdx < ep.steps.length - 1) renderTurn(currentTurnIdx + 1); });
document.getElementById('scrubber').addEventListener('input', e => { stopPlay(); renderTurn(parseInt(e.target.value)); });

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); if (playing) stopPlay(); else startPlay(); }
  if (e.code === 'ArrowRight') { stopPlay(); const ep = episodes[currentEpIdx]; if (currentTurnIdx < ep.steps.length - 1) renderTurn(currentTurnIdx + 1); }
  if (e.code === 'ArrowLeft') { stopPlay(); if (currentTurnIdx > 0) renderTurn(currentTurnIdx - 1); }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
