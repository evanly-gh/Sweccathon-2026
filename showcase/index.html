<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RhetBench — Replay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07080f;
    --bg2:       #0c0e18;
    --surface:   #0f1120;
    --surface2:  #161929;
    --surface3:  #1e2235;
    --border:    #222640;
    --border2:   #2e3458;

    --indigo:    #6366f1;
    --indigo-dim:#4547b0;
    --indigo-glow: rgba(99,102,241,0.25);
    --indigo-faint: rgba(99,102,241,0.08);
    --platinum:  #e8eaf2;
    --silver:    #a0a6bf;
    --slate:     #4a5280;
    --faint:     #232840;

    --green:     #4ade80;
    --green-glow: rgba(74,222,128,0.2);
    --red:       #f87171;
    --red-glow:  rgba(248,113,113,0.2);

    --at-logical:    #4ade80;
    --at-emotional:  #f87171;
    --at-authority:  #a78bfa;
    --at-social:     #fbbf24;
    --at-anecdote:   #fb923c;
    --at-concession: #67e8f9;
    --at-generic:    #334155;

    --agent-bg:  #0d1022;
    --npc-bg:    #0b1018;

    --serif: 'Instrument Serif', Georgia, serif;
    --mono:  'Geist Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--platinum);
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    min-height: 100vh;
    /* subtle dot-grid background */
    background-image:
      radial-gradient(circle, rgba(99,102,241,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 290px 1fr 260px;
    grid-template-rows: 56px 1fr 112px;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    grid-column: 1/-1;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 24px;
    background: rgba(15, 17, 32, 0.85);
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 20;
    /* shimmer line at bottom */
    box-shadow: 0 1px 0 rgba(99,102,241,0.2), 0 4px 32px rgba(0,0,0,0.6);
  }
  /* static indigo line — no animation */
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, var(--indigo-dim) 50%, transparent 90%);
    opacity: 0.5;
  }

  .logo {
    font-family: var(--serif);
    font-size: 21px;
    font-style: italic;
    font-weight: 400;
    color: var(--platinum);
    letter-spacing: -0.2px;
    line-height: 1;
    position: relative;
  }
  /* indigo underline glow on logo */
  .logo::after {
    content: '';
    position: absolute;
    left: 0; bottom: -2px; right: 0;
    height: 1px;
    background: var(--indigo);
    box-shadow: 0 0 8px var(--indigo);
    opacity: 0.7;
  }

  .badge {
    padding: 3px 9px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate);
    background: var(--indigo-faint);
  }

  .scenario-title {
    font-size: 11.5px;
    color: var(--silver);
    opacity: 0.7;
    font-style: italic;
  }

  /* ── Sidebars ── */
  .sidebar-left, .sidebar-right {
    grid-row: 2/3;
    overflow-y: auto;
    background: rgba(15, 17, 32, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    position: relative;
    z-index: 5;
  }
  .sidebar-left {
    border-right: 1px solid var(--border);
    box-shadow: 4px 0 32px rgba(0,0,0,0.5), inset -1px 0 0 var(--indigo-faint);
  }
  .sidebar-right {
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 32px rgba(0,0,0,0.5), inset 1px 0 0 var(--indigo-faint);
  }

  /* ── Main chat — animated orb background ── */
  .main {
    grid-row: 2/3;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: transparent;
    position: relative;
  }

  /* drifting orbs — pseudo elements can only give us 2, so we use a canvas-free approach:
     layered radial gradients that animate independently via background-position */
  .main::before {
    content: '';
    position: absolute;
    inset: 0;
    /* two slow-drifting orbs via background-size + animation */
    background:
      radial-gradient(ellipse 55% 45% at 30% 60%, rgba(99,102,241,0.07) 0%, transparent 65%),
      radial-gradient(ellipse 45% 55% at 75% 35%, rgba(80,140,220,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 35% 30% at 55% 85%, rgba(99,102,241,0.04) 0%, transparent 60%);
    background-size: 200% 200%;
    background-position: 0% 0%, 100% 100%, 50% 50%;
    animation: orbDrift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }

  /* sharp vignette over the top of the orbs */
  .main::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 25% at 50% 0%, rgba(0,0,0,0.5) 0%, transparent 100%),
      radial-gradient(ellipse 100% 15% at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }

  @keyframes orbDrift {
    0%   { background-position: 0% 20%,   100% 80%, 40% 60%; }
    33%  { background-position: 30% 60%,  70% 20%,  80% 30%; }
    66%  { background-position: 70% 10%,  30% 70%,  20% 80%; }
    100% { background-position: 100% 50%, 0% 40%,   60% 10%; }
  }
  .chat {
    flex: 1;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: relative;
    z-index: 2;
  }

  /* ── Controls footer ── */
  .controls {
    grid-column: 1/-1;
    background: rgba(15, 17, 32, 0.9);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 0 rgba(99,102,241,0.15), 0 -8px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 24px;
    position: relative;
    z-index: 20;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 8.5px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--slate);
    margin-bottom: 9px;
  }

  /* ── Episode rail ── */
  .ep-rail { padding: 14px 12px 10px; }
  .ep-grid { display: flex; flex-wrap: wrap; gap: 5px; }

  .ep-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 10px;
    font-weight: 400;
    font-family: var(--mono);
    color: var(--slate);
    transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; justify-content: center;
  }
  .ep-btn:hover {
    border-color: var(--indigo);
    color: var(--platinum);
    background: var(--indigo-faint);
    box-shadow: 0 0 12px var(--indigo-glow), 0 4px 12px rgba(0,0,0,0.4);
    transform: translateY(-1px);
  }
  .ep-btn.active {
    border-color: var(--indigo);
    color: var(--platinum);
    background: var(--indigo-faint);
    box-shadow: 0 0 0 1px var(--indigo-dim), 0 0 16px var(--indigo-glow);
  }
  .ep-btn.won   { border-color: var(--green); color: var(--green); }
  .ep-btn.lost  { border-color: var(--red);   color: var(--red);   }
  .ep-btn.won.active  { box-shadow: 0 0 12px var(--green-glow); background: rgba(74,222,128,0.06); }
  .ep-btn.lost.active { box-shadow: 0 0 12px var(--red-glow);   background: rgba(248,113,113,0.06); }

  /* ── Scenario info ── */
  .scenario-info { padding: 10px 12px; border-top: 1px solid var(--border); }
  .info-block { margin-bottom: 10px; }
  .info-block .info-text { font-size: 11.5px; color: var(--silver); line-height: 1.5; }
  .info-params { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 8px; }
  .info-row { display: flex; justify-content: space-between; font-size: 10.5px; }
  .info-label { color: var(--slate); }
  .info-value { color: var(--silver); text-align: right; }
  .info-detail { cursor: pointer; user-select: none; margin-top: 6px; }
  .info-detail summary { font-size: 8.5px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; list-style: none; }
  .info-detail summary::before { content: '+ '; }
  .info-detail[open] summary::before { content: '− '; }
  .info-detail summary:hover { color: var(--silver); }
  .info-detail p { font-size: 10.5px; color: var(--slate); line-height: 1.55; margin: 0 0 5px; }

  /* ── Bars ── */
  .agree-section { padding: 10px 12px; border-top: 1px solid var(--border); }

  .bar-wrap {
    position: relative;
    height: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-wrap.small { height: 10px; }
  .bar-fill {
    position: absolute; top: 0; height: 100%;
    transition: width 0.45s cubic-bezier(0.34,1.56,0.64,1),
                left  0.45s cubic-bezier(0.34,1.56,0.64,1),
                background 0.3s;
  }
  .bar-center {
    position: absolute; top: 0; left: 50%;
    width: 1px; height: 100%;
    background: var(--border2);
    transform: translateX(-50%);
    z-index: 1;
  }
  .bar-threshold {
    position: absolute; top: 0; height: 100%;
    width: 1px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    opacity: 0.8;
    z-index: 2;
  }
  .bar-value { font-size: 15px; font-weight: 300; text-align: center; margin-top: 5px; letter-spacing: 0.04em; }
  .bar-value.small { font-size: 11px; margin-top: 3px; }
  .bar-hint { font-size: 8.5px; color: var(--faint); text-align: center; margin-top: 3px; letter-spacing: 0.06em; color: var(--slate); }

  /* ── Dev section ── */
  .dev-section { padding: 10px 12px; border-top: 1px solid var(--border); }
  .dev-row { font-size: 9px; color: var(--slate); margin-bottom: 3px; word-break: break-all; }

  /* ── Messages — with slide-in animation ── */
  .msg { display: flex; gap: 10px; max-width: 82%; }
  .msg.agent { align-self: flex-start; }
  .msg.npc   { align-self: flex-end; flex-direction: row-reverse; }
  .msg.system { align-self: center; max-width: 96%; width: 100%; }

  /* slide-in for newest message */
  .msg.new-agent {
    animation: slideFromLeft 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }
  .msg.new-npc {
    animation: slideFromRight 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes slideFromLeft {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideFromRight {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 8.5px; font-weight: 400; letter-spacing: 0.06em;
    border: 1px solid var(--border2);
  }
  .agent .avatar { background: var(--indigo-faint); color: var(--indigo); border-color: var(--indigo-dim); }
  .npc   .avatar { background: rgba(100,130,180,0.08); color: #7ea8d0; border-color: #2a3d58; }

  .bubble {
    padding: 11px 14px;
    font-size: 12.5px;
    line-height: 1.65;
    position: relative;
    max-width: 100%;
  }
  .agent .bubble {
    background: var(--agent-bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--indigo-dim);
    border-radius: 0 10px 10px 10px;
    box-shadow:
      0 0 0 1px rgba(99,102,241,0.05) inset,
      0 1px 0 rgba(99,102,241,0.1) inset,
      0 4px 16px rgba(0,0,0,0.5),
      0 12px 32px rgba(0,0,0,0.3);
  }
  .npc .bubble {
    background: var(--npc-bg);
    border: 1px solid var(--border);
    border-right: 2px solid #2a4060;
    border-radius: 10px 0 10px 10px;
    color: var(--silver);
    box-shadow:
      0 1px 0 rgba(100,150,200,0.07) inset,
      0 4px 16px rgba(0,0,0,0.5),
      0 12px 32px rgba(0,0,0,0.3);
  }
  .system .bubble {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10.5px;
    color: var(--slate);
    text-align: center;
    width: 100%;
    padding: 7px 14px;
    font-style: italic;
  }

  /* argument tags */
  .arg-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 7px;
    border: 1px solid currentColor;
    animation: tagPop 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes tagPop {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }
  .reward-tag { display: inline-block; font-size: 10px; color: var(--slate); margin-top: 6px; margin-left: 5px; }

  /* current indicator — pulsing ring */
  .current-indicator {
    position: absolute; top: -4px; right: -4px;
    width: 10px; height: 10px;
  }
  .current-indicator::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--indigo);
    box-shadow: 0 0 8px var(--indigo);
    animation: dot-pulse 1.8s ease-in-out infinite;
  }
  .current-indicator::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1.5px solid var(--indigo);
    opacity: 0;
    animation: ring-expand 1.8s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%,100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(0.8); opacity: 0.7; }
  }
  @keyframes ring-expand {
    0%   { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .npc .current-indicator::before {
    background: #7ea8d0;
    box-shadow: 0 0 8px rgba(126,168,208,0.6);
    animation-name: dot-pulse-blue;
  }
  .npc .current-indicator::after {
    border-color: #7ea8d0;
  }
  @keyframes dot-pulse-blue {
    0%,100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(0.8); opacity: 0.7; }
  }

  /* argument type colors */
  .at-EMOTIONAL    { color: var(--at-emotional);   border-color: var(--at-emotional); }
  .at-LOGICAL      { color: var(--at-logical);     border-color: var(--at-logical); }
  .at-SOCIAL_PROOF { color: var(--at-social);      border-color: var(--at-social); }
  .at-AUTHORITY    { color: var(--at-authority);   border-color: var(--at-authority); }
  .at-ANECDOTE     { color: var(--at-anecdote);    border-color: var(--at-anecdote); }
  .at-CONCESSION   { color: var(--at-concession);  border-color: var(--at-concession); }
  .at-GENERIC      { color: var(--slate);          border-color: var(--border2); }

  /* ── HUD ── */
  .hud { padding: 14px 12px; }
  .hud-title {
    font-size: 8.5px; font-weight: 400;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--slate); margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .metric { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; gap: 8px; }
  .metric-label { font-size: 10.5px; color: var(--slate); flex-shrink: 0; }
  .metric-value { font-size: 12.5px; font-weight: 300; text-align: right; letter-spacing: 0.02em; }
  .metric-value.good    { color: var(--green); }
  .metric-value.bad     { color: var(--red);   }
  .metric-value.neutral { color: var(--silver); }
  .strategy-bar { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
  .reasoning-box { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .reasoning-text { font-size: 10.5px; color: var(--slate); line-height: 1.55; max-height: 170px; overflow-y: auto; white-space: pre-wrap; font-style: italic; }

  /* ── Playback controls ── */
  .scrubber-row { display: flex; align-items: center; gap: 14px; }
  .scrubber {
    flex: 1; appearance: none;
    height: 2px;
    background: var(--surface3);
    border-radius: 2px; cursor: pointer; outline: none;
  }
  .scrubber::-webkit-slider-thumb {
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--platinum);
    cursor: pointer;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--indigo), 0 0 12px var(--indigo-glow);
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .scrubber::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--indigo), 0 0 20px var(--indigo-glow);
  }
  .turn-display { font-size: 10.5px; color: var(--slate); min-width: 70px; white-space: nowrap; }
  .btn-row { display: flex; align-items: center; gap: 8px; }
  .ctrl-btn {
    padding: 6px 16px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--silver);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--indigo); color: var(--platinum); background: var(--indigo-faint); box-shadow: 0 0 10px var(--indigo-glow); }
  .ctrl-btn.play {
    background: var(--indigo);
    border-color: var(--indigo);
    color: #fff;
    box-shadow: 0 0 16px var(--indigo-glow);
  }
  .ctrl-btn.play:hover { background: #7678f3; box-shadow: 0 0 24px var(--indigo-glow); }
  .speed-select {
    padding: 5px 9px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--slate); font-size: 11px; font-family: var(--mono); cursor: pointer; outline: none;
  }
  .speed-select:focus { border-color: var(--indigo); }

  .status-pill {
    padding: 3px 10px; border-radius: 2px;
    font-size: 8.5px; font-weight: 400; font-family: var(--mono);
    letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid currentColor;
  }
  .status-pill.won  { color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .status-pill.lost { color: var(--red);   box-shadow: 0 0 8px var(--red-glow); }

  .no-data { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--slate); font-size: 13px; font-style: italic; flex-direction: column; gap: 8px; }

  #run-selector {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--silver); font-size: 11px; font-family: var(--mono);
    padding: 6px 8px; margin-bottom: 10px; cursor: pointer; outline: none;
  }
  #run-selector:focus { border-color: var(--indigo); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .kbd-hint { font-size: 10.5px; color: var(--slate); }
  kbd { background: var(--surface3); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--border2); font-family: var(--mono); font-size: 9.5px; color: var(--silver); }
</style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <span class="logo">RhetBench</span>
    <span class="badge">SWECCATHON 2026</span>
    <span class="scenario-title" id="hdr-scenario">Loading...</span>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <span class="status-pill" id="hdr-status"></span>
      <span class="kbd-hint">Press <kbd>Space</kbd> to play</span>
    </div>
  </header>

  <aside class="sidebar-left">
    <div id="run-selector-wrap" class="ep-rail" style="display:none">
      <div class="section-label">Select Run</div>
      <select id="run-selector"></select>
    </div>
    <div class="ep-rail">
      <div class="section-label">Episodes</div>
      <div class="ep-grid" id="ep-grid"></div>
    </div>
    <div class="scenario-info" id="scenario-info"></div>
    <div class="agree-section">
      <div class="section-label">Agreement</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="agree-fill"></div>
        <div class="bar-center"></div>
        <div class="bar-threshold" id="agree-threshold"></div>
      </div>
      <div class="bar-value" id="agree-value">—</div>
    </div>
    <div class="agree-section">
      <div class="section-label">Rapport</div>
      <div class="bar-wrap small">
        <div class="bar-fill" id="rapport-fill"></div>
        <div class="bar-center"></div>
      </div>
      <div class="bar-value small" id="rapport-value">—</div>
      <div class="bar-hint">trust amplifies every argument ±24%</div>
    </div>
    <div class="dev-section" id="dev-section"></div>
  </aside>

  <main class="main" id="chat-main">
    <div class="chat" id="chat"></div>
  </main>

  <aside class="sidebar-right">
    <div class="hud">
      <div class="hud-title">Live Telemetry</div>
      <div class="metric"><span class="metric-label">Turn</span><span class="metric-value neutral" id="hud-turn">—</span></div>
      <div class="metric"><span class="metric-label">Reward</span><span class="metric-value neutral" id="hud-reward">—</span></div>
      <div class="metric"><span class="metric-label">Cumulative</span><span class="metric-value neutral" id="hud-cumulative">—</span></div>
      <div class="metric"><span class="metric-label">Diversity</span><span class="metric-value neutral" id="hud-diversity">—</span></div>
      <div class="metric"><span class="metric-label">Rep penalty</span><span class="metric-value neutral" id="hud-penalty">—</span></div>
      <div class="metric"><span class="metric-label">Rapport</span><span class="metric-value neutral" id="hud-rapport">—</span></div>
      <div class="metric"><span class="metric-label">Rapport effect</span><span class="metric-value neutral" id="hud-rapport-effect">—</span></div>
      <div class="metric"><span class="metric-label">Norm score</span><span class="metric-value neutral" id="hud-norm">—</span></div>
      <div class="strategy-bar" id="strategy-bar"></div>
      <div class="reasoning-box">
        <div class="hud-title">Model Reasoning</div>
        <div class="reasoning-text" id="hud-reasoning">(not available in export)</div>
      </div>
    </div>
  </aside>

  <footer class="controls">
    <div class="scrubber-row">
      <span class="turn-display" id="turn-display">turn 0 / 0</span>
      <input type="range" class="scrubber" id="scrubber" min="0" value="0" step="1">
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" id="btn-prev">&#9664;&#9664;</button>
      <button class="ctrl-btn play" id="btn-play">&#9654; Play</button>
      <button class="ctrl-btn" id="btn-next">&#9654;&#9654;</button>
      <select class="speed-select" id="speed-select">
        <option value="2000">0.5x</option>
        <option value="1000" selected>1x</option>
        <option value="500">2x</option>
        <option value="250">4x</option>
      </select>
    </div>
  </footer>
</div>

<script>
let REPLAY = null;
let runMeta = {};
let manifest = [];

function loadManifest() {
  return fetch('data/manifest.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('no manifest'); return r.json(); })
    .catch(() => []);
}
function loadReplayFile(filename) {
  return fetch('data/' + filename + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); });
}
function loadReplay() {
  if (window.REPLAY) return Promise.resolve(window.REPLAY);
  return fetch('data/replay.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }).catch(() => makeDemoReplay());
}
function makeDemoReplay() {
  return {
    run: { id: 'demo', config: { agent_config: { model: 'demo/local' } }, scores: { win_rate: 1.0, persuasion_score: 0.88 } },
    episodes: [{ id: 'demo-1', seed: 42, terminal_info: { won: '1' } }],
    traces: {},
    replay: { 'demo-1': [
      { step: 1, board_before: { turn: 0, max_turns: 25, topic: 'adopting renewable energy', your_position: 'Transition to renewables.', scenario_context: 'Demo mode — run: python save_run.py RUN_ID', npc_opening_statement: 'I need hard numbers. What is the actual payback period?', npc_response: 'I need hard numbers. What is the actual payback period?', turns_remaining: '25' },
        observation: { turn: 1, npc_response: 'ROI data is better than expected.', turns_remaining: '24' },
        action: { message: 'Studies show a 5-year payback with 20% cost reduction across 200 comparable firms.' },
        reward: 0.22, info: { argument_type: 'LOGICAL', agreement: '-0.28', rapport: '0.055', threshold: '0.25', norm_score: '0.0', won: '0', diversity: '1', rep_penalty_total: '0.0', scenario_display_name: 'The Data Skeptic', npc_response: 'ROI data is better than expected.' } },
    ] }
  };
}

let episodes = [], currentEpIdx = 0, currentTurnIdx = 0, playing = false, playTimer = null;

loadManifest().then(m => {
  manifest = m;
  if (manifest.length > 0) {
    const wrap = document.getElementById('run-selector-wrap');
    const sel  = document.getElementById('run-selector');
    wrap.style.display = '';
    manifest.forEach(entry => {
      const opt = document.createElement('option');
      opt.value = entry.filename;
      const wr = entry.scores?.win_rate;
      opt.textContent = entry.label + (wr !== undefined ? ` — ${(wr*100).toFixed(0)}% win` : '');
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => loadReplayFile(sel.value).then(data => initFromData(data)));
    return loadReplayFile(manifest[0].filename);
  }
  return loadReplay();
}).then(data => initFromData(data));

function initFromData(data) {
  REPLAY = data;
  if (data.run) runMeta = { id: data.run.id || '', model: data.run.config?.agent_config?.model || 'unknown', scores: data.run.scores || {} };

  const traceLookup = {};
  if (data.traces) {
    for (const [epId, events] of Object.entries(data.traces)) {
      traceLookup[epId] = {};
      for (const ev of events) {
        if (ev.event_type === 'technique_event') {
          const p = typeof ev.payload === 'string' ? JSON.parse(ev.payload) : ev.payload;
          if (p.kind === 'reasoning' || p.reasoning) traceLookup[epId][ev.step] = p.reasoning || p.content || JSON.stringify(p);
        }
      }
    }
  }

  if (data.episodes && data.replay) {
    episodes = data.episodes.map(ep => {
      const epId = ep.id || ep.episode_id;
      const rawSteps = data.replay[epId] || [];
      const epTraces = traceLookup[epId] || {};
      const steps = [];

      if (rawSteps.length > 0 && rawSteps[0].board_before) {
        const fi = rawSteps[0].info || {};
        steps.push({
          turn: 0, observation: rawSteps[0].board_before, action: null, reward: 0, reasoning: '',
          info: {
            agreement: fi.starting_agreement || ep.terminal_info?.starting_agreement || '',
            starting_agreement: fi.starting_agreement || ep.terminal_info?.starting_agreement || '',
            rapport: '0.0',
            threshold: fi.threshold || ep.terminal_info?.threshold || '',
            difficulty: fi.difficulty || ep.terminal_info?.difficulty || '',
            difficulty_explanation: fi.difficulty_explanation || ep.terminal_info?.difficulty_explanation || '',
            benchmarking_value: fi.benchmarking_value || ep.terminal_info?.benchmarking_value || '',
            repetition_penalty: fi.repetition_penalty || ep.terminal_info?.repetition_penalty || '',
            scenario_id: fi.scenario_id || '', scenario_display_name: fi.scenario_display_name || '',
          },
        });
      }

      for (const t of rawSteps) {
        let action = t.action;
        if (typeof action === 'string') { try { action = JSON.parse(action); } catch(e) { action = { message: action }; } }
        const stepNum = t.step !== undefined ? t.step : steps.length;
        steps.push({ turn: stepNum, observation: t.observation || {}, action, reward: t.reward || 0, info: t.info || {}, reasoning: t.reasoning || epTraces[stepNum] || epTraces[String(stepNum)] || '' });
      }

      const won = ep.terminal_info?.won === '1' || ep.terminal_info?.won === 1 || steps.some(s => s.info?.won === '1');
      const error = ep.terminal_info?.error || (ep.status === 'failed' && steps.length <= 1 ? 'Episode failed — likely token limit or rate limit.' : '');
      return { id: epId, seed: ep.seed, won, steps, error, status: ep.status };
    });
  } else if (data.steps) {
    episodes = [{ id: 'local-0', seed: data.seed, won: data.steps.some(s => s.info?.won === '1'), steps: data.steps }];
  }

  if (!episodes.length || episodes.every(ep => !ep.steps.length)) {
    document.getElementById('chat').innerHTML = '<div class="no-data"><div>No replay data found.</div></div>';
    return;
  }
  buildEpRail(); buildDevSection(); selectEpisode(0);
}

function buildDevSection() {
  const el = document.getElementById('dev-section');
  const sc = runMeta.scores;
  el.innerHTML = `
    <div class="section-label">Run</div>
    <div class="dev-row">model: ${escHtml(runMeta.model)}</div>
    ${sc?.win_rate !== undefined ? `<div class="dev-row">win_rate: ${(sc.win_rate*100).toFixed(0)}%</div>` : ''}
    ${sc?.strategy_optimality !== undefined ? `<div class="dev-row">optimality: ${sc.strategy_optimality.toFixed(3)}</div>` : ''}
    ${sc?.avg_turns_to_win !== undefined ? `<div class="dev-row">avg_turns_to_win: ${sc.avg_turns_to_win.toFixed(1)}</div>` : ''}
    ${sc?.persuasion_score !== undefined ? `<div class="dev-row">persuasion: ${Math.min(sc.persuasion_score, 3).toFixed(3)}</div>` : ''}
    <div class="dev-row" style="margin-top:4px; color: var(--faint)">id: ${escHtml((runMeta.id || '').slice(0,16))}...</div>
  `;
}

function buildEpRail() {
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = '';
  episodes.forEach((ep, i) => {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (ep.error ? ' lost' : ep.won ? ' won' : ' lost');
    btn.textContent = ep.error ? '!' : (i + 1);
    btn.title = ep.error ? `Ep ${i+1} — ERROR (seed ${ep.seed})` : `Ep ${i+1} — ${ep.won ? 'WON' : 'LOST'} (seed ${ep.seed})`;
    btn.addEventListener('click', () => selectEpisode(i));
    grid.appendChild(btn);
  });
}

function selectEpisode(idx) {
  stopPlay(); currentEpIdx = idx; currentTurnIdx = 0;
  document.querySelectorAll('.ep-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const ep = episodes[idx];
  document.getElementById('scrubber').max = Math.max(0, ep.steps.length - 1);
  document.getElementById('scrubber').value = 0;
  renderTurn(0);
  let scenarioName = '';
  for (const s of ep.steps) { if (s.info?.scenario_display_name) { scenarioName = s.info.scenario_display_name; break; } }
  document.getElementById('hdr-scenario').textContent = scenarioName || 'Episode ' + (idx + 1);
  const statusEl = document.getElementById('hdr-status');
  if (ep.error) { statusEl.className = 'status-pill lost'; statusEl.textContent = 'ERROR'; }
  else { statusEl.className = 'status-pill ' + (ep.won ? 'won' : 'lost'); statusEl.textContent = ep.won ? 'WON' : 'LOST'; }
}

function renderTurn(turnIdx) {
  currentTurnIdx = turnIdx;
  const ep = episodes[currentEpIdx];
  const chat = document.getElementById('chat');
  chat.innerHTML = '';

  if (ep.error) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg system';
    errDiv.innerHTML = `<div class="bubble" style="border-color:var(--red); color:var(--red);"><strong>Episode failed</strong><br>${escHtml(ep.error.slice(0,500))}</div>`;
    chat.appendChild(errDiv);
  }

  for (let i = 0; i <= turnIdx && i < ep.steps.length; i++) {
    const step = ep.steps[i];
    const isCurrent = i === turnIdx;
    const isNew = isCurrent && turnIdx > 0;  // only animate the newest message

    if (!step.action) {
      const obs = step.observation || {};
      if (obs.scenario_context) appendSystemMsg(chat, obs.scenario_context);
      const opening = obs.npc_opening_statement || obs.npc_response;
      if (opening) appendNpcMsg(chat, opening, isCurrent && turnIdx === 0, isNew && turnIdx === 0);
      continue;
    }

    const msg = extractMessage(step.action);
    if (msg) {
      const argType = step.info?.argument_type || 'GENERIC';
      appendAgentMsg(chat, msg, argType, step.reward, isCurrent, isNew);
    }

    const npcResp = step.info?.npc_response || step.observation?.npc_response;
    if (npcResp) appendNpcMsg(chat, npcResp, false, false);
  }

  document.getElementById('chat-main').scrollTop = document.getElementById('chat-main').scrollHeight;
  updateBars(turnIdx);
  updateHUD(turnIdx);
  document.getElementById('scrubber').value = turnIdx;
  document.getElementById('turn-display').textContent = `turn ${turnIdx} / ${ep.steps.length - 1}`;
  updateScenarioInfo(ep.steps[0]);
}

function extractMessage(action) {
  if (!action) return null;
  if (typeof action === 'string') return action;
  if (action.message) return action.message;
  if (action.action?.message) return action.action.message;
  return null;
}

function appendSystemMsg(container, text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  container.appendChild(div);
}

function appendAgentMsg(container, text, argType, reward, isCurrent, animate) {
  const div = document.createElement('div');
  div.className = 'msg agent' + (animate ? ' new-agent' : '');
  const rs = reward >= 0 ? '+' : '';
  const rc = reward > 0 ? 'var(--green)' : reward < 0 ? 'var(--red)' : 'var(--slate)';
  div.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble" style="position:relative">
      ${isCurrent ? '<span class="current-indicator"></span>' : ''}
      ${escHtml(text)}
      <div style="margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <span class="arg-tag at-${argType}">${argType}</span>
        <span class="reward-tag" style="color:${rc}">delta ${rs}${(reward||0).toFixed(3)}</span>
      </div>
    </div>`;
  container.appendChild(div);
}

function appendNpcMsg(container, text, isCurrent, animate) {
  const div = document.createElement('div');
  div.className = 'msg npc' + (animate ? ' new-npc' : '');
  div.innerHTML = `
    <div class="avatar">NPC</div>
    <div class="bubble" style="position:relative">
      ${isCurrent ? '<span class="current-indicator"></span>' : ''}
      ${escHtml(text)}
    </div>`;
  container.appendChild(div);
}

function setBarFill(fillEl, value, posColor, negColor) {
  const pct = Math.abs(value) * 50;
  if (value >= 0) {
    fillEl.style.left = '50%';
    fillEl.style.width = pct + '%';
    fillEl.style.background = posColor;
  } else {
    fillEl.style.left = (50 - pct) + '%';
    fillEl.style.width = pct + '%';
    fillEl.style.background = negColor;
  }
}

function getInfoAt(turnIdx) {
  const ep = episodes[currentEpIdx];
  for (let i = turnIdx; i >= 0; i--) {
    const info = ep.steps[i]?.info;
    if (info && info.agreement !== undefined) return info;
  }
  return {};
}

function updateBars(turnIdx) {
  const info = getInfoAt(turnIdx);
  const agreement = parseFloat(info.agreement);
  const threshold  = parseFloat(info.threshold);
  const rapport    = parseFloat(info.rapport);

  const agreeFill = document.getElementById('agree-fill');
  const agreeVal  = document.getElementById('agree-value');
  if (!isNaN(agreement)) {
    const won = !isNaN(threshold) && agreement >= threshold;
    const posColor = won ? `linear-gradient(90deg, #3ab870, var(--green))` : `linear-gradient(90deg, #3ab870, var(--green))`;
    setBarFill(agreeFill, agreement, 'var(--green)', 'var(--red)');
    agreeVal.textContent = agreement.toFixed(3);
    agreeVal.style.color = agreement >= 0 ? 'var(--green)' : 'var(--red)';
    agreeFill.style.boxShadow = won ? `0 0 10px var(--green-glow)` : agreement >= 0 ? `0 0 4px var(--green-glow)` : `0 0 4px var(--red-glow)`;
  } else {
    agreeFill.style.width = '0%'; agreeVal.textContent = '—'; agreeVal.style.color = 'var(--slate)';
  }

  if (!isNaN(threshold)) {
    const threshPct = ((threshold + 1) / 2) * 100;
    document.getElementById('agree-threshold').style.left = threshPct + '%';
    document.getElementById('agree-threshold').style.display = '';
  } else {
    document.getElementById('agree-threshold').style.display = 'none';
  }

  const rapportFill = document.getElementById('rapport-fill');
  const rapportVal  = document.getElementById('rapport-value');
  if (!isNaN(rapport)) {
    setBarFill(rapportFill, rapport, 'var(--green)', 'var(--red)');
    rapportFill.style.boxShadow = rapport >= 0 ? '0 0 4px var(--green-glow)' : '0 0 4px var(--red-glow)';
    rapportVal.textContent = rapport.toFixed(3);
    rapportVal.style.color = rapport >= 0 ? 'var(--green)' : 'var(--red)';
  } else {
    rapportFill.style.width = '0%'; rapportVal.textContent = '—'; rapportVal.style.color = 'var(--slate)';
  }
}

function updateHUD(turnIdx) {
  const ep   = episodes[currentEpIdx];
  const step = ep.steps[turnIdx] || {};
  const info = getInfoAt(turnIdx);

  const hset = (id, val, cls) => {
    const el = document.getElementById(id);
    if (el) { el.textContent = val; el.className = 'metric-value ' + (cls || 'neutral'); }
  };

  hset('hud-turn', info.turn || turnIdx, 'neutral');
  const reward = step.reward;
  hset('hud-reward', reward !== undefined && reward !== 0 ? (reward >= 0 ? '+' : '') + reward.toFixed(4) : '—',
    reward > 0 ? 'good' : reward < 0 ? 'bad' : 'neutral');

  let cum = 0;
  for (let i = 0; i <= turnIdx; i++) cum += (ep.steps[i]?.reward || 0);
  hset('hud-cumulative', (cum >= 0 ? '+' : '') + cum.toFixed(4), cum >= 0 ? 'good' : 'bad');
  hset('hud-diversity', info.diversity || '—', 'neutral');
  hset('hud-penalty', info.rep_penalty_total ? '-' + info.rep_penalty_total : '—', parseFloat(info.rep_penalty_total) > 0 ? 'bad' : 'neutral');

  const rapport = parseFloat(info.rapport);
  hset('hud-rapport', !isNaN(rapport) ? (rapport >= 0 ? '+' : '') + rapport.toFixed(3) : '—', rapport > 0.2 ? 'good' : rapport < -0.1 ? 'bad' : 'neutral');
  if (!isNaN(rapport)) {
    const effect = rapport * 0.30;
    hset('hud-rapport-effect', (effect >= 0 ? '+' : '') + (effect * 100).toFixed(1) + '% to shifts', effect > 5 ? 'good' : effect < -3 ? 'bad' : 'neutral');
  } else { hset('hud-rapport-effect', '—', 'neutral'); }
  hset('hud-norm', info.norm_score || '—', parseFloat(info.norm_score) > 0.5 ? 'good' : parseFloat(info.norm_score) < 0 ? 'bad' : 'neutral');

  const stratBar = document.getElementById('strategy-bar');
  if (info.arg_types_used) {
    try {
      const types = JSON.parse(info.arg_types_used);
      const counts = {};
      types.forEach(t => counts[t] = (counts[t] || 0) + 1);
      stratBar.innerHTML = Object.entries(counts).map(([t, n]) => `<span class="arg-tag at-${t}" title="${t}: ${n}x">${t.slice(0,3)} ×${n}</span>`).join('');
    } catch(e) { stratBar.innerHTML = ''; }
  } else { stratBar.innerHTML = ''; }

  document.getElementById('hud-reasoning').textContent = step.reasoning || '(not available in export)';
}

function updateScenarioInfo(step0) {
  const obs  = step0?.observation || {};
  const info = getInfoAt(0);
  const container = document.getElementById('scenario-info');
  const topic    = obs.topic || '';
  const pos      = obs.your_position || '';
  const threshold = info.threshold || '';
  const startAgree = info.starting_agreement || info.agreement || '';
  const difficulty = info.difficulty || '';
  const diffExpl   = info.difficulty_explanation || '';
  const benchVal   = info.benchmarking_value || '';
  const repPen     = info.repetition_penalty || '';
  container.innerHTML = `
    <div class="info-block">
      <span class="section-label">Topic</span>
      <div class="info-text">${escHtml(topic)}</div>
    </div>
    <div class="info-block">
      <span class="section-label">Position</span>
      <div class="info-text">${escHtml(pos)}</div>
    </div>
    <div class="info-params">
      ${difficulty ? `<div class="info-row"><span class="info-label">difficulty</span><span class="info-value">${escHtml(difficulty)}</span></div>` : ''}
      ${startAgree ? `<div class="info-row"><span class="info-label">start</span><span class="info-value">${startAgree}</span></div>` : ''}
      ${threshold  ? `<div class="info-row"><span class="info-label">threshold</span><span class="info-value">${threshold}</span></div>` : ''}
      ${repPen     ? `<div class="info-row"><span class="info-label">rep pen</span><span class="info-value">${repPen}</span></div>` : ''}
    </div>
    ${(diffExpl || benchVal) ? `<details class="info-detail">
      <summary>scenario details</summary>
      ${diffExpl ? `<p><strong>difficulty:</strong> ${escHtml(diffExpl)}</p>` : ''}
      ${benchVal ? `<p><strong>tests:</strong> ${escHtml(benchVal)}</p>` : ''}
    </details>` : ''}
  `;
}

function stopPlay() {
  playing = false; clearTimeout(playTimer);
  document.getElementById('btn-play').innerHTML = '&#9654; Play';
  document.getElementById('btn-play').classList.add('play');
}
function startPlay() {
  playing = true;
  document.getElementById('btn-play').innerHTML = '&#9646;&#9646; Pause';
  document.getElementById('btn-play').classList.add('play');
  tick();
}
function tick() {
  if (!playing) return;
  const ep = episodes[currentEpIdx];
  if (currentTurnIdx >= ep.steps.length - 1) { stopPlay(); return; }
  renderTurn(currentTurnIdx + 1);
  playTimer = setTimeout(tick, parseInt(document.getElementById('speed-select').value));
}

document.getElementById('btn-play').addEventListener('click', () => { if (playing) stopPlay(); else startPlay(); });
document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); if (currentTurnIdx > 0) renderTurn(currentTurnIdx - 1); });
document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); const ep = episodes[currentEpIdx]; if (currentTurnIdx < ep.steps.length - 1) renderTurn(currentTurnIdx + 1); });
document.getElementById('scrubber').addEventListener('input', e => { stopPlay(); renderTurn(parseInt(e.target.value)); });

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); if (playing) stopPlay(); else startPlay(); }
  if (e.code === 'ArrowRight') { stopPlay(); const ep = episodes[currentEpIdx]; if (currentTurnIdx < ep.steps.length - 1) renderTurn(currentTurnIdx + 1); }
  if (e.code === 'ArrowLeft')  { stopPlay(); if (currentTurnIdx > 0) renderTurn(currentTurnIdx - 1); }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
